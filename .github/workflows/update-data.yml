name: Hourly Data Refresh

on:
  schedule:
    - cron: '7 * * * *'  # Every hour at :07
  workflow_dispatch:      # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch PostHog data and update dashboard
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: https://posthog-prod.heysorin.ai
          POSTHOG_PROJECT_ID: '1'
        run: node scripts/fetch-posthog-data.js

      - name: Commit if changed
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@sahara.ai"
          git diff --quiet data.js || \
            git add data.js && \
            git commit -m "data: auto-refresh $(date -u '+%Y-%m-%d %H:%M UTC')" && \
            git push
